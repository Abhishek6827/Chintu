name: Build & Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for desktop-relevant changes
        id: check
        run: |
          $before = "${{ github.event.before }}"
          $after = "${{ github.sha }}"

          if ($before -eq "0000000000000000000000000000000000000000") {
            $changedFiles = git diff --name-only HEAD~1 $after
          } else {
            $changedFiles = git diff --name-only $before $after
          }

          if ([string]::IsNullOrWhiteSpace($changedFiles)) {
            Write-Host "No files changed. Skipping build."
            "HAS_DESKTOP_CHANGE=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $websiteOnlyPaths = @(
            '^src/app/about/',
            '^src/app/blog/',
            '^src/app/faq/',
            '^src/app/pricing/',
            '^src/app/privacy/',
            '^src/app/terms/',
            '^src/app/support/',
            '^src/app/download/',
            '^src/app/page\.tsx$',
            '^src/app/sitemap\.ts$',
            '^src/app/robots\.ts$',
            '^public/1\.mp4$',
            '^public/[4-9]\.png$',
            '^public/blog_.*\.png$',
            '^public/bug\.png$',
            '^public/og-image\.png$',
            '^README\.md$'
          )

          $hasDesktopChange = $false
          foreach ($file in $changedFiles -split "`n") {
            $file = $file.Trim()
            if ([string]::IsNullOrWhiteSpace($file)) { continue }

            $isWebsiteOnly = $false
            foreach ($pattern in $websiteOnlyPaths) {
              if ($file -match $pattern) {
                $isWebsiteOnly = $true
                break
              }
            }

            if (-not $isWebsiteOnly) {
              $hasDesktopChange = $true
              Write-Host "Desktop-relevant change detected: $file"
              break
            }
          }

          if ($hasDesktopChange) {
            "HAS_DESKTOP_CHANGE=true" >> $env:GITHUB_OUTPUT
          } else {
            "HAS_DESKTOP_CHANGE=false" >> $env:GITHUB_OUTPUT
            Write-Host "Only website-only files changed. Skipping desktop build."
          }
        shell: pwsh

      - name: Setup Node.js
        if: steps.check.outputs.HAS_DESKTOP_CHANGE == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.HAS_DESKTOP_CHANGE == 'true'
        run: npm ci

      - name: Auto-increment patch version
        if: steps.check.outputs.HAS_DESKTOP_CHANGE == 'true'
        id: version
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $parts = $pkg.version -split '\.'
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2] + 1
          
          if ($patch -ge 100) {
            $patch = 0
            $minor += 1
          }
          if ($minor -ge 100) {
            $minor = 0
            $major += 1
          }
          
          $version = "$major.$minor.$patch"
          Write-Host "Bumping: $($pkg.version) -> $version"
          npm version $version --no-git-tag-version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Commit version bump back to repo
        if: steps.check.outputs.HAS_DESKTOP_CHANGE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "Abhishek6827"
          git config user.email "devilizbusy@gmail.com"
          git add package.json
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/Abhishek6827/Chintu.git master
        shell: pwsh

      - name: Create config.json with API keys
        if: steps.check.outputs.HAS_DESKTOP_CHANGE == 'true'
        run: |
          @"
          {
            "GROQ_API_KEY": "${{ secrets.GROQ_API_KEY }}",
            "GROQ_API_KEY_2": "${{ secrets.GROQ_API_KEY_2 }}",
            "GROQ_API_KEY_3": "${{ secrets.GROQ_API_KEY_3 }}",
            "OPENROUTER_API_KEY": "${{ secrets.OPENROUTER_API_KEY }}",
            "DASHSCOPE_API_KEY": "${{ secrets.DASHSCOPE_API_KEY }}"
          }
          "@ | Out-File -FilePath electron/config.json -Encoding UTF8

      - name: Build Next.js
        if: steps.check.outputs.HAS_DESKTOP_CHANGE == 'true'
        run: npm run build

      - name: Delete old desktop releases from Chintu_Releases
        if: steps.check.outputs.HAS_DESKTOP_CHANGE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          $releases = gh api repos/Abhishek6827/Chintu_Releases/releases --jq '.[] | select(.tag_name | startswith("v")) | .id' | Select-Object -Skip 3
          foreach ($id in $releases) {
            Write-Host "Deleting old desktop release $id"
            gh api -X DELETE repos/Abhishek6827/Chintu_Releases/releases/$id || true
          }
        shell: pwsh

      - name: Build Electron & Publish to GitHub Releases
        if: steps.check.outputs.HAS_DESKTOP_CHANGE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: npx electron-builder --win --publish always

      - name: Send Telegram Notification
        if: always() && steps.check.outputs.HAS_DESKTOP_CHANGE == 'true'
        run: |
          $status = if ("${{ job.status }}" -eq "success") { "✅ SUCCESS" } else { "❌ FAILED" }
          $message = "🚀 *Chintu Build Report*`n`n" +
                     "*Project:* ${{ github.repository }}`n" +
                     "*Status:* $status`n" +
                     "*Version:* ${{ steps.version.outputs.VERSION }}`n" +
                     "*Commit:* `${{ github.sha }}`n" +
                     "*Branch:* `${{ github.ref_name }}`n`n" +
                     "[View Build Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          
          $payload = @{
              chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"
              text = $message
              parse_mode = "Markdown"
          }
          
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_BUILD_BOT_TOKEN }}/sendMessage" -Method Post -Body ($payload | ConvertTo-Json) -ContentType "application/json"
        shell: pwsh
