name: Build & Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Auto-increment patch version
        id: version
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $parts = $pkg.version -split '\.'
          $major = $parts[0]
          $minor = $parts[1]
          $patch = [int]$parts[2] + 1
          $version = "$major.$minor.$patch"
          Write-Host "Bumping: $($pkg.version) -> $version"
          npm version $version --no-git-tag-version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Commit version bump back to repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }} [skip ci]"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/Abhishek6827/Chintu.git master
        shell: pwsh

      - name: Create config.json with API keys
        run: |
          @"
          {
            "GROQ_API_KEY": "${{ secrets.GROQ_API_KEY }}",
            "GROQ_API_KEY_2": "${{ secrets.GROQ_API_KEY_2 }}",
            "GROQ_API_KEY_3": "${{ secrets.GROQ_API_KEY_3 }}",
            "OPENROUTER_API_KEY": "${{ secrets.OPENROUTER_API_KEY }}",
            "DASHSCOPE_API_KEY": "${{ secrets.DASHSCOPE_API_KEY }}"
          }
          "@ | Out-File -FilePath electron/config.json -Encoding UTF8

      - name: Build Next.js
        run: npm run build

      - name: Build Electron & Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: npx electron-builder --win --publish always
