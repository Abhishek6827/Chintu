name: Build & Release

on:
  push:
    branches:
      - main
      - master  # Triggers on push to either branch

permissions:
  contents: write  # Needed to create GitHub Releases + tags

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for commit count

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Auto-generate version from date + commit count
        id: version
        run: |
          $date = Get-Date -Format "yy.M.d"
          $count = (git rev-list --count HEAD)
          $version = "$date.$count"
          Write-Host "Generated version: $version"
          npm version $version --no-git-tag-version --allow-same-version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create config.json with API keys + GitHub token
        run: |
          @"
          {
            "GROQ_API_KEY": "${{ secrets.GROQ_API_KEY }}",
            "GROQ_API_KEY_2": "${{ secrets.GROQ_API_KEY_2 }}",
            "GROQ_API_KEY_3": "${{ secrets.GROQ_API_KEY_3 }}",
            "OPENROUTER_API_KEY": "${{ secrets.OPENROUTER_API_KEY }}",
            "GH_TOKEN": "${{ secrets.GH_PAT }}"
          }
          "@ | Out-File -FilePath electron/config.json -Encoding UTF8

      - name: Build Next.js
        run: npm run build

      - name: Build Electron & Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Create Git Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"
        shell: bash
